# Spring Boot Application Configurations
spring.application.name=ecotukar
server.port=8080

# Spring MVC JSP view resolution prefix & suffix
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Logging settings for API monitoring
logging.level.org.springframework.web=INFO
logging.level.com.ecotukar=DEBUG

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/ecotukar?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hibernate ddl-auto
spring.jpa.hibernate.ddl-auto=update
