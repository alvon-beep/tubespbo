<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EcoTukar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center py-10">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold text-center text-emerald-600 mb-6">Daftar Akun EcoTukar</h1>
        
        <div th:if="${param.error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            <span th:text="${param.error}"></span>
        </div>

        <form action="/register" method="post">
            <div class="mb-4">
                <label class="block text-slate-700 text-sm font-bold mb-2">Nama Lengkap</label>
                <input type="text" name="name" class="shadow appearance-none border rounded w-full py-2 px-3 text-slate-700" required>
            </div>
            <div class="mb-4">
                <label class="block text-slate-700 text-sm font-bold mb-2">Email</label>
                <input type="email" name="email" class="shadow appearance-none border rounded w-full py-2 px-3 text-slate-700" required>
            </div>
            <div class="mb-4">
                <label class="block text-slate-700 text-sm font-bold mb-2">Alamat (Opsional)</label>
                <input type="text" name="address" class="shadow appearance-none border rounded w-full py-2 px-3 text-slate-700">
            </div>
            <input type="hidden" name="role" value="CUSTOMER">
            <div class="mb-4">
                <label class="block text-slate-700 text-sm font-bold mb-2">Username</label>
                <input type="text" name="username" class="shadow appearance-none border rounded w-full py-2 px-3 text-slate-700" required>
            </div>
            <div class="mb-6">
                <label class="block text-slate-700 text-sm font-bold mb-2">Password</label>
                <input type="password" name="password" class="shadow appearance-none border rounded w-full py-2 px-3 text-slate-700" required>
            </div>
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded">
                Daftar
            </button>
        </form>
        <p class="mt-4 text-center text-sm text-slate-600">
            Sudah punya akun? <a href="/login" class="text-emerald-600 hover:underline">Login di sini</a>
        </p>
    </div>
</body>
</html>
