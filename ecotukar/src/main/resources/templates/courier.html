<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTukar — Kurir Portal</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="min-h-screen bg-emerald-50/40 font-sans text-slate-800 antialiased">

    <!-- Mobile-First Container, centered on larger displays -->
    <div class="max-w-md mx-auto pb-28 min-h-screen bg-slate-50 shadow-2xl flex flex-col relative border-x border-emerald-100">
        
        <!-- ===== Mobile Header ===== -->
        <header class="bg-gradient-to-br from-emerald-600 to-green-700 text-white p-6 rounded-b-[2.5rem] shadow-lg space-y-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-full bg-white/20 border border-white/10 grid place-items-center text-2xl shadow-inner">👷</div>
                    <div>
                        <p class="text-[10px] uppercase font-bold tracking-wider text-emerald-100">Selamat Tugas,</p>
                        <p class="font-extrabold text-base" id="courier-name" th:text="${name} ?: 'Budi Santoso'">Budi Santoso</p>
                    </div>
                </div>
                <button class="w-10 h-10 rounded-full bg-white/15 hover:bg-white/20 flex items-center justify-center font-bold relative transition">
                    🔔
                    <div class="absolute top-2 right-2 w-2 h-2 bg-amber-400 rounded-full"></div>
                </button>
            </div>

            <!-- Dashboard Summary Statistics -->
            <div class="grid grid-cols-3 gap-2.5 text-center">
                <div class="bg-white/10 rounded-2xl py-3 border border-white/5 backdrop-blur-md">
                    <p class="text-xl font-extrabold" id="stat-pickups">0</p>
                    <p class="text-[9px] uppercase font-bold text-emerald-100 tracking-wider mt-0.5">Tugas</p>
                </div>
                <div class="bg-white/10 rounded-2xl py-3 border border-white/5 backdrop-blur-md">
                    <p class="text-xl font-extrabold" id="stat-weight">0 kg</p>
                    <p class="text-[9px] uppercase font-bold text-emerald-100 tracking-wider mt-0.5">Estimasi</p>
                </div>
                <div class="bg-white/10 rounded-2xl py-3 border border-white/5 backdrop-blur-md">
                    <p class="text-xl font-extrabold">11.5 km</p>
                    <p class="text-[9px] uppercase font-bold text-emerald-100 tracking-wider mt-0.5">Jarak</p>
                </div>
            </div>
        </header>

        <!-- ===== Smart Routing List ===== -->
        <main class="flex-1 p-5 space-y-4">
            <div class="flex items-center justify-between border-b border-slate-100 pb-3">
                <h2 class="font-extrabold text-slate-800 tracking-tight">🗺️ Rute Penjemputan</h2>
                <span class="text-[10px] font-bold text-emerald-600 bg-emerald-50 border border-emerald-100 px-2.5 py-1 rounded-md">Urut Jarak</span>
            </div>

            <!-- Task List container -->
            <div class="space-y-4" id="task-list">
                <!-- Loaded dynamically -->
            </div>
        </main>

        <!-- ===== Mobile Bottom Navigation Bar ===== -->
        <nav class="absolute bottom-0 inset-x-0 bg-white border-t border-slate-100 grid grid-cols-3 py-3 text-[10px] font-bold text-slate-400">
            <a href="/courier" class="flex flex-col items-center gap-1 text-emerald-600">
                <span class="text-xl">🏠</span>Beranda
            </a>
            <a href="/courier-riwayat" class="flex flex-col items-center gap-1 hover:text-emerald-600 transition">
                <span class="text-xl">📜</span>Riwayat
            </a>
            <a href="/logout" class="flex flex-col items-center gap-1 hover:text-rose-600 transition text-slate-400">
                <span class="text-xl">🚪</span>Keluar
            </a>
        </nav>
    </div>

    <!-- Verification Modal -->
    <div id="verifyModal" class="fixed inset-0 z-50 hidden bg-slate-900/60 backdrop-blur-sm grid place-items-center px-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl relative">
            <button onclick="closeVerifyModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600">✖</button>
            <h3 class="font-extrabold text-slate-800 text-lg mb-1">Verifikasi Penjemputan</h3>
            <p class="text-xs text-slate-500 mb-5">Validasi kondisi sampah sebelum diangkut ke kendaraan.</p>

            <form id="verifyForm" class="space-y-4">
                <input type="hidden" id="verifyPickupId">
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Kondisi Fisik Sampah</label>
                    <select id="verifyCondition" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 focus:outline-none transition text-sm font-semibold text-slate-700 bg-slate-50">
                        <option value="Sesuai">Sesuai Deskripsi</option>
                        <option value="Tercampur">Tercampur Jenis Lain</option>
                        <option value="Kotor/Basah">Kotor / Basah</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Kesesuaian Data</label>
                    <div class="flex items-center gap-3">
                        <label class="flex items-center gap-2 text-sm font-semibold text-slate-700 cursor-pointer">
                            <input type="radio" name="verifyDataValid" value="true" checked class="w-4 h-4 text-emerald-600 focus:ring-emerald-500 border-slate-300">
                            Data Sesuai
                        </label>
                        <label class="flex items-center gap-2 text-sm font-semibold text-slate-700 cursor-pointer">
                            <input type="radio" name="verifyDataValid" value="false" class="w-4 h-4 text-emerald-600 focus:ring-emerald-500 border-slate-300">
                            Data Berbeda
                        </label>
                    </div>
                </div>
                <div class="pt-3 border-t border-slate-100">
                    <button type="submit" class="w-full py-3.5 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-bold shadow-lg shadow-emerald-100 hover:-translate-y-0.5 active:translate-y-0 transition">
                        Verifikasi & Angkut
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        const taskList = document.getElementById('task-list');
        const statPickups = document.getElementById('stat-pickups');
        const statWeight = document.getElementById('stat-weight');
        
        // Pass the name from Thymeleaf into JavaScript
        const myCourierName = /*[[${name}]]*/ 'Budi Santoso';

        // Fetch assigned pickup tickets
        async function fetchCourierRoutes() {
            try {
                const res = await fetch('/api/pickups');
                const pickups = await res.json();

                // Filter requests assigned to the logged-in courier
                const courierPickups = pickups.filter(p => p.courier === myCourierName || p.courier === 'Budi S.'); // Keep Budi S. for dummy data compatibility if needed
                
                // Count active pending tasks
                const activeTasks = courierPickups.filter(p => p.status !== 'COMPLETED' && p.status !== 'CANCELLED');
                statPickups.innerText = activeTasks.length;

                // Total estimated weight for active tasks
                let estWeight = 0;
                activeTasks.forEach(p => estWeight += p.estimatedWeight);
                statWeight.innerText = `${estWeight} kg`;

                // Render lists
                taskList.innerHTML = '';

                if (courierPickups.length === 0) {
                    taskList.innerHTML = `
                        <div class="text-center py-10 text-slate-400 space-y-2">
                            <p class="text-4xl">📭</p>
                            <p class="text-sm font-semibold">Tidak ada tugas penjemputan hari ini</p>
                        </div>
                    `;
                    return;
                }

                courierPickups.forEach((p, idx) => {
                    const statusConfig = getStatusConfig(p.status);
                    
                    // Conditionally render action buttons based on status
                    let actionHtml = '';
                    if (p.status === 'ASSIGNED' || p.status === 'PENDING') {
                        actionHtml = `
                            <div class="mt-4 grid grid-cols-3 gap-2 border-t border-slate-50 pt-3">
                                <button onclick="updateTicketStatus('${p.id}', 'ON_ROUTE')" class="py-2.5 rounded-xl text-xs font-bold bg-sky-50 text-sky-700 hover:bg-sky-100 active:scale-95 transition">
                                    📍 Check-in
                                </button>
                                <button onclick="updateTicketStatus('${p.id}', 'PICKED_UP')" class="py-2.5 rounded-xl text-xs font-bold bg-emerald-600 text-white hover:bg-emerald-700 active:scale-95 transition">
                                    ✅ Diangkut
                                </button>
                                <button onclick="updateTicketStatus('${p.id}', 'CANCELLED')" class="py-2.5 rounded-xl text-xs font-bold bg-rose-50 text-rose-700 hover:bg-rose-100 active:scale-95 transition">
                                    ✖ Batal
                                </button>
                            </div>
                        `;
                    } else if (p.status === 'ON_ROUTE') {
                        actionHtml = `
                            <div class="mt-4 grid grid-cols-2 gap-2 border-t border-slate-50 pt-3">
                                <button onclick="openVerifyModal('${p.id}')" class="py-2.5 rounded-xl text-xs font-bold bg-emerald-600 text-white hover:bg-emerald-700 active:scale-95 transition flex justify-center items-center gap-1.5">
                                    <span>🔍</span> Verifikasi & Angkut
                                </button>
                                <button onclick="updateTicketStatus('${p.id}', 'CANCELLED')" class="py-2.5 rounded-xl text-xs font-bold bg-rose-50 text-rose-700 hover:bg-rose-100 active:scale-95 transition flex justify-center items-center gap-1.5">
                                    <span>✖</span> Batal
                                </button>
                            </div>
                        `;
                    } else {
                        // Completed or Cancelled - no action needed
                        actionHtml = `
                            <div class="mt-3 text-center border-t border-slate-50 pt-2.5">
                                <p class="text-[10px] text-slate-400 font-bold uppercase">Proses Penjemputan Selesai</p>
                            </div>
                        `;
                    }

                    taskList.innerHTML += `
                        <article class="bg-white rounded-2xl p-4.5 border border-emerald-100/50 shadow-sm space-y-3.5 hover:shadow-md transition">
                            <div class="flex items-start gap-3">
                                <div class="w-8 h-8 rounded-full bg-emerald-600 text-white font-extrabold grid place-items-center text-xs shadow-md">
                                    ${idx + 1}
                                </div>
                                <div class="flex-1 space-y-1">
                                    <div class="flex items-center justify-between">
                                        <p class="font-extrabold text-sm text-slate-800">${p.customerName}</p>
                                        <span class="text-[9px] font-extrabold px-2.5 py-1 rounded-full uppercase tracking-wider ${statusConfig.badge}">
                                            ${statusConfig.label}
                                        </span>
                                    </div>
                                    <p class="text-xs text-slate-500 font-semibold">📍 ${p.address}</p>
                                    ${p.note ? `<p class="text-[10px] text-amber-600 bg-amber-50 px-2 py-1.5 rounded-lg border border-amber-100 font-medium">💬 Catatan: "${p.note}"</p>` : ''}
                                    <div class="flex flex-wrap gap-1.5 pt-2 text-[10px] font-bold">
                                        <span class="px-2.5 py-1 rounded-lg bg-emerald-50 text-emerald-700 border border-emerald-100">${p.wasteType} • ${p.estimatedWeight} kg</span>
                                        <span class="px-2.5 py-1 rounded-lg bg-slate-100 text-slate-500 border border-slate-200">⏱️ ${p.time}</span>
                                    </div>
                                </div>
                            </div>
                            ${actionHtml}
                        </article>
                    `;
                });

            } catch (e) {
                console.error("Error loading courier routes", e);
            }
        }

        // Action Trigger
        async function updateTicketStatus(id, newStatus) {
            try {
                const res = await fetch(`/api/pickups/${id}/status`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });

                if (res.ok) {
                    let alertMsg = "";
                    if (newStatus === 'ON_ROUTE') alertMsg = "Mulai rute penjemputan! Status diubah ke ON ROUTE.";
                    else if (newStatus === 'PICKED_UP') alertMsg = "Sampah telah diangkut ke kendaraan! Status diubah ke PICKED UP (Menunggu timbangan Admin).";
                    else if (newStatus === 'CANCELLED') alertMsg = "Jadwal penjemputan telah dibatalkan.";

                    alert(`ID: ${id}\n\n${alertMsg}`);
                    fetchCourierRoutes();
                } else {
                    alert("Gagal merubah status tiket.");
                }
            } catch(e) {
                console.error(e);
                alert("Kesalahan koneksi.");
            }
        }

        // Modal Logic
        const verifyModal = document.getElementById('verifyModal');
        const verifyForm = document.getElementById('verifyForm');
        const verifyPickupId = document.getElementById('verifyPickupId');
        const verifyCondition = document.getElementById('verifyCondition');

        function openVerifyModal(id) {
            verifyPickupId.value = id;
            verifyModal.classList.remove('hidden');
        }

        function closeVerifyModal() {
            verifyModal.classList.add('hidden');
            verifyForm.reset();
        }

        verifyForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = verifyPickupId.value;
            const dataValid = document.querySelector('input[name="verifyDataValid"]:checked').value === 'true';
            const condition = verifyCondition.value;

            try {
                const res = await fetch(`/api/pickups/${id}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dataValid: dataValid, physicalCondition: condition })
                });

                if (res.ok) {
                    const data = await res.json();
                    alert(`ID: ${id}\n\n${data.message}\nVerifikasi ID: ${data.verificationId}\n\nStatus diubah ke PICKED UP (Menunggu timbangan Admin).`);
                    closeVerifyModal();
                    fetchCourierRoutes();
                } else {
                    const err = await res.json();
                    alert(err.message || "Gagal memverifikasi penjemputan.");
                }
            } catch(e) {
                console.error(e);
                alert("Kesalahan koneksi.");
            }
        });

        function getStatusConfig(status) {
            return {
                PENDING:    { label: 'Menunggu', bg: 'bg-amber-50', badge: 'bg-amber-100 text-amber-700 border border-amber-200/50' },
                ASSIGNED:   { label: 'Tugas Baru', bg: 'bg-indigo-50', badge: 'bg-indigo-100 text-indigo-700 border border-indigo-200/50' },
                ON_ROUTE:   { label: 'Rute Jalan', bg: 'bg-sky-50', badge: 'bg-sky-100 text-sky-700 border border-sky-200/50' },
                PICKED_UP:  { label: 'Diangkut', bg: 'bg-teal-50', badge: 'bg-teal-100 text-teal-700 border border-teal-200/50' },
                COMPLETED:  { label: 'Selesai', bg: 'bg-emerald-50', badge: 'bg-emerald-100 text-emerald-700 border border-emerald-200/50' },
                CANCELLED:  { label: 'Batal', bg: 'bg-rose-50', badge: 'bg-rose-100 text-rose-700 border border-rose-200/50' }
            }[status.toUpperCase()] || { label: status, bg: 'bg-slate-50', badge: 'bg-slate-100 text-slate-700' };
        }

        // Initial load
        fetchCourierRoutes();
        
        // Polling loop to sync states (every 4 seconds)
        setInterval(fetchCourierRoutes, 4000);
    </script>
</body>
</html>
