# ==========================================
# EcoTukar — application.properties
# ==========================================

# Baca credentials dari file .env
spring.config.import=optional:file:.env[.properties]

# ===== Database (MySQL) =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===== JPA / Hibernate =====
# update = otomatis buat/update tabel sesuai entity (jangan pakai create di production!)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== App Name =====
spring.application.name=ecotukar

# ===== Static Resources =====
# Serve file HTML dari resources/static/
spring.web.resources.static-locations=classpath:/static/

# ===== Server Port =====
server.port=8080
