<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTukar — Riwayat Pickup</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-emerald-50/30 font-sans text-slate-800 flex flex-col lg:flex-row antialiased">
    <!-- ===== Sidebar ===== -->
    <aside class="hidden lg:flex w-64 bg-white border-r border-emerald-100 flex-col p-6 shrink-0 shadow-sm">
        <div class="flex items-center gap-2.5 mb-10">
            <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-emerald-500 to-green-600 grid place-items-center text-white font-extrabold shadow-md">E</div>
            <span class="font-extrabold text-lg tracking-tight bg-gradient-to-r from-emerald-700 to-green-700 bg-clip-text text-transparent">EcoTukar</span>
        </div>
        <nav class="space-y-2 text-sm font-semibold">
            <a href="/customer" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-emerald-50/50 hover:text-emerald-700 transition">🏠 Dashboard</a>
            <a href="/customer-riwayat" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-emerald-50 text-emerald-700 transition">📦 Riwayat Pickup</a>
            <a href="/customer-ewallet" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-emerald-50/50 hover:text-emerald-700 transition">🪙 E-Wallet</a>
            <a href="/logout" class="flex items-center gap-3 px-4 py-3 rounded-xl text-rose-500 hover:bg-rose-50/50 hover:text-rose-700 transition mt-4 border-t border-slate-100 pt-4">🚪 Keluar</a>
        </nav>
    </aside>

    <main class="flex-1 p-6 lg:p-10 space-y-8 max-w-5xl mx-auto w-full">
        <!-- Header -->
        <header class="border-b border-emerald-50 pb-5">
            <h1 class="text-2xl md:text-3xl font-extrabold text-slate-900 tracking-tight">📦 Riwayat Pickup</h1>
            <p class="text-slate-500 text-sm font-medium mt-1">Lacak dan pantau status seluruh permintaan penjemputan sampahmu.</p>
        </header>

        <section class="bg-white rounded-2xl p-6 border border-emerald-100/70 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[700px]">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider border-b border-slate-200">
                            <th class="p-4 font-bold">Tiket ID</th>
                            <th class="p-4 font-bold">Tanggal</th>
                            <th class="p-4 font-bold">Jenis Sampah</th>
                            <th class="p-4 font-bold">Estimasi</th>
                            <th class="p-4 font-bold">Kurir</th>
                            <th class="p-4 font-bold">Status</th>
                        </tr>
                    </thead>
                    <tbody id="pickup-table-body" class="text-sm">
                        <tr><td colspan="6" class="p-8 text-center text-slate-400">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script th:inline="javascript">
        // Inject username via thymeleaf if available.
        const currentUser = /*[[${username}]]*/ 'sarah';

        async function fetchPickups() {
            try {
                const res = await fetch('/api/pickups');
                const allPickups = await res.json();
                
                const myPickups = allPickups.filter(p => p.username === currentUser || p.username === 'sarah');
                
                const tbody = document.getElementById('pickup-table-body');
                tbody.innerHTML = '';
                
                if (myPickups.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-slate-400">Belum ada riwayat penjemputan.</td></tr>';
                    return;
                }

                // Reverse to show latest first
                myPickups.reverse().forEach(p => {
                    let statusClass = 'bg-yellow-100 text-yellow-700 border border-yellow-200';
                    if (p.status === 'COMPLETED') statusClass = 'bg-emerald-100 text-emerald-700 border border-emerald-200';
                    if (p.status === 'ON_PROCESS') statusClass = 'bg-blue-100 text-blue-700 border border-blue-200';
                    if (p.status === 'CANCELED') statusClass = 'bg-rose-100 text-rose-700 border border-rose-200';
                    
                    const courierName = (p.courier && p.courier !== 'Belum') ? p.courier : '-';

                    tbody.innerHTML += `
                        <tr class="border-b border-slate-100 hover:bg-emerald-50/30 transition">
                            <td class="p-4 font-bold text-slate-700">${p.id}</td>
                            <td class="p-4 text-slate-500">${p.date}</td>
                            <td class="p-4 font-semibold text-slate-700">${p.wasteType}</td>
                            <td class="p-4 text-slate-500">${p.estimatedWeight} kg</td>
                            <td class="p-4 text-slate-600 font-medium">${courierName}</td>
                            <td class="p-4">
                                <span class="px-3 py-1 rounded-lg text-[10px] uppercase tracking-wider font-extrabold ${statusClass}">${p.status}</span>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error(err);
                document.getElementById('pickup-table-body').innerHTML = '<tr><td colspan="6" class="p-8 text-center text-rose-500">Gagal memuat data.</td></tr>';
            }
        }

        fetchPickups();
    </script>
</body>
</html>
